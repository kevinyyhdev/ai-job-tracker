spring:
  application:
    name: jobtracker

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-do-not-use-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: AI Job Tracker API
    version: 1.0.0
    description: API for tracking job applications with AI-assisted resume matching
